<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Modo Matuê | Escolha Seu Flow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header com logo e título -->
        <div class="header">
            <div class="logo-container">
                <i class="fas fa-crown logo-icon"></i>
                <span class="logo-text">30PRAUM</span>
            </div>
            <h1>ESCOLHA SEU FLOW</h1>
            <p class="subtitle">Uma jornada no universo de Matuê</p>
        </div>

        <!-- Card principal da história -->
        <div class="story-card">
            <div class="story-content">
                <div class="story-icon">
                    <i class="fas fa-microphone-alt"></i>
                </div>
                <p id="story-text" class="story-text">
                    Você está prestes a entrar no estúdio com Matuê para gravar uma faixa. 
                    O beat já está tocando. O que você faz?
                </p>
            </div>
        </div>

        <!-- Área de escolhas -->
        <div class="choices-area">
            <h3><i class="fas fa-compass"></i> SUA DECISÃO</h3>
            <div id="choices" class="choices-container"></div>
        </div>

        <!-- Timer com design moderno -->
        <div class="timer-card">
            <div class="timer-label">
                <i class="fas fa-hourglass-half"></i>
                <span>TEMPO PARA DECIDIR</span>
            </div>
            <div id="timer" class="timer-display">07:02:25</div>
            <div class="timer-bar">
                <div id="timer-progress" class="timer-progress"></div>
            </div>
        </div>

        <!-- Botão reiniciar -->
        <div class="restart-btn-container">
            <button id="restart-btn" class="restart-btn">
                <i class="fas fa-sync-alt"></i>
                <span>NOVA JORNADA</span>
            </button>
        </div>

        <!-- Footer -->
        <footer>
            <p><i class="fas fa-music"></i> Baseado no universo 30PRAUM | @matue</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
