<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha Seu Flow - Matuê</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎙️ ESCOLHA SEU FLOW</h1>
            <h2>Uma jornada no universo de Matuê</h2>
        </header>

        <main>
            <div class="story-box">
                <p id="story-text">
                    Você está prestes a entrar no estúdio com Matuê para gravar uma faixa. 
                    O beat já está tocando. O que você faz?
                </p>
            </div>

            <div class="choices" id="choices">
                <button onclick="makeChoice(1)">🔥 Mandar um flow superfantástico na hora</button>
                <button onclick="makeChoice(2)">🎧 Pedir pra ouvir o beat mais uma vez</button>
                <button onclick="makeChoice(3)">💡 Sugerir um sample de guitarra (estilo Máquina do Tempo)</button>
            </div>

            <div class="timer">
                <span id="timer">07:00:00</span>
            </div>

            <div class="restart">
                <button onclick="restartGame()">🔄 Recomeçar jornada</button>
            </div>
        </main>

        <footer>
            <p>🎵 Baseado no universo 30PRAUM | @matue</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
